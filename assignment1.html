<!DOCTYPE html>
<head>
  <title>Github</title>
  <style>

    .container{
            width: 200px;
            padding: 5px;
            border: 2px solid black;
            border-radius: 5px;
            background-color:rgb(46, 43, 43);
            margin-left: 300px;
    }
    .container2{
            width: 200px;
            padding: 5px;
            border: 2px solid black;
            border-radius: 5px;
            background-color:rgb(46, 43, 43);
            margin-top: 10px;
            margin-left: 300px;
    } 
   
    .username{
      padding:5px;
      border:2px solid black;
      border-radius: 5px;
      margin-top: 5px;
      margin-bottom: 5px;
     
    }
    
    .password{
      padding:5px;
      border-radius: 3px;
      border:2px solid black;
      margin-top: 5px;

    }
    .sign{
      padding: 5px;
      border: 2px solid black;
      border-radius: 3px;
      background-color: green;
      margin-top: 5px; 
    }
    .sign:hover{
      background-color: darkblue;
    }
    .sign:active{
      background-color: pink;
    }
    .create{
      padding:20px;
      margin-top: 5px;
      border-radius: 3px;
    }
    h3{
      color:white
    }
    label{
      color:white
    }
    p{
      color:white
    }
    img{
      margin-top: 10px;
    }


  </style>
</head>
<body>
  <div class="container">
  <img src="github image.png" height="40px">
  <h3>Sign in to GitHub</h3>
  <label>Username or email address</label><br>
  <input class="username"placeholder="Username or email address"/><br>
  <label>Password</label><br>
  <input class="password" type="password"placeholder="password"/><br>
  <button class="sign">Sign in</button><br>
   </div>
  <div class="container2">
  <p>New to GitHub? <a href="signup.html">Create an account</a></p>
  </div>


</body>
</html>
